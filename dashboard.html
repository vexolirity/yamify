<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Yamify - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        .app-container { display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: #000;
            border-right: 1px solid #282828;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
        }
        .logo { display: flex; align-items: center; gap: 8px; padding: 0 12px; margin-bottom: 30px; }
        .logo h1 { font-size: 26px; background: linear-gradient(135deg, #1DB954, #1ed760); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-menu { display: flex; flex-direction: column; gap: 6px; margin-bottom: 30px; }
        .nav-item {
            display: flex; align-items: center; gap: 14px; padding: 12px 16px;
            border-radius: 10px; color: #b3b3b3; cursor: pointer; transition: 0.2s;
            background: none; border: none; width: 100%; font-size: 14px;
        }
        .nav-item:hover { color: white; background: #1a1a1a; }
        .nav-item.active { background: #282828; color: #1DB954; }
        .sidebar-footer { margin-top: auto; padding-top: 20px; border-top: 1px solid #282828; }
        .upload-btn {
            width: 100%; display: flex; align-items: center; justify-content: center;
            gap: 10px; padding: 12px; background: #1f1f1f; border: none;
            border-radius: 30px; color: white; font-size: 14px; cursor: pointer;
            margin-bottom: 16px;
        }
        .user-info { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #1a1a1a; border-radius: 30px; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; }
        .user-email { font-size: 11px; color: #b3b3b3; flex: 1; overflow: hidden; }
        .logout-icon { cursor: pointer; font-size: 18px; }
        
        /* MAIN */
        .main-content { flex: 1; overflow-y: auto; background: #121212; padding: 20px 24px 100px 24px; }
        .panel { display: none; animation: fadeIn 0.3s; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
        .panel-header h1 { font-size: 28px; }
        .search-box input { background: #1f1f1f; border: 1px solid #2a2a2a; padding: 10px 16px 10px 40px; border-radius: 30px; color: white; width: 250px; }
        .search-box { position: relative; }
        .search-box::before { content: '🔍'; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); }
        
        /* SONGS GRID */
        .songs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .song-card {
            background: #181818; border-radius: 12px; padding: 16px;
            cursor: pointer; transition: 0.3s; position: relative;
        }
        .song-card:hover { background: #282828; transform: translateY(-5px); }
        .song-cover-wrapper { position: relative; margin-bottom: 12px; }
        .song-cover { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; }
        .play-overlay {
            position: absolute; bottom: 8px; right: 8px; background: #1DB954;
            width: 40px; height: 40px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; opacity: 0;
            transition: 0.2s; cursor: pointer;
        }
        .song-card:hover .play-overlay { opacity: 1; }
        .song-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-artist { font-size: 12px; color: #b3b3b3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-duration { font-size: 11px; color: #6a6a6a; margin-top: 6px; }
        
        /* UPLOAD FORM */
        .upload-form { max-width: 600px; background: #181818; padding: 28px; border-radius: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #b3b3b3; }
        .form-group input, .form-group select {
            width: 100%; background: #2a2a2a; border: 1px solid #3a3a3a;
            padding: 12px 14px; border-radius: 10px; color: white; font-size: 14px;
        }
        .submit-btn {
            background: #1DB954; border: none; padding: 14px; border-radius: 40px;
            font-weight: 700; cursor: pointer; color: black; font-size: 15px; width: 100%;
        }
        .upload-status { margin-top: 16px; padding: 10px; border-radius: 10px; text-align: center; font-size: 13px; }
        .upload-status.success { background: #0a2f1f; color: #1DB954; }
        .upload-status.error { background: #450a0a; color: #ef4444; }
        
        /* NOW PLAYING BAR */
        .now-playing-bar {
            position: fixed; bottom: 0; left: 260px; right: 0; background: #181818;
            border-top: 1px solid #282828; padding: 12px 20px;
            display: flex; align-items: center; gap: 20px; z-index: 20;
        }
        .now-playing-bar.hidden { display: none; }
        .player-info { display: flex; align-items: center; gap: 12px; min-width: 180px; }
        .player-cover { width: 50px; height: 50px; border-radius: 8px; }
        .player-title { font-weight: 600; font-size: 14px; }
        .player-artist { font-size: 11px; color: #b3b3b3; }
        .player-controls { display: flex; gap: 16px; }
        .control-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: white; }
        .control-btn.play-pause { width: 36px; height: 36px; border-radius: 50%; background: white; color: black; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .player-progress { flex: 1; display: flex; align-items: center; gap: 10px; }
        #progressBar { flex: 1; height: 4px; border-radius: 2px; background: #535353; -webkit-appearance: none; }
        #progressBar::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #1DB954; }
        .volume-control { display: flex; align-items: center; gap: 8px; }
        #volumeSlider { width: 80px; }
        
        .empty-state { text-align: center; padding: 60px; color: #6a6a6a; }
        .empty-state span { font-size: 48px; display: block; margin-bottom: 16px; }
        .create-btn { background: #1DB954; border: none; padding: 10px 20px; border-radius: 30px; font-weight: 600; cursor: pointer; color: black; }
        .sort-btn { background: #1f1f1f; border: none; padding: 8px 16px; border-radius: 30px; color: white; cursor: pointer; }
        
        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .logo h1 { display: none; }
            .nav-item .nav-text { display: none; }
            .nav-item { justify-content: center; }
            .upload-btn span:last-child { display: none; }
            .now-playing-bar { left: 80px; flex-wrap: wrap; }
            .songs-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo"><span>🎵</span><h1>Yamify</h1></div>
            <nav class="nav-menu">
                <button class="nav-item active" data-panel="library"><span class="icon">🏠</span><span class="nav-text">Beranda</span></button>
                <button class="nav-item" data-panel="liked"><span class="icon">❤️</span><span class="nav-text">Disukai</span></button>
                <button class="nav-item" data-panel="playlist"><span class="icon">📋</span><span class="nav-text">Playlist</span></button>
                <button class="nav-item" data-panel="top"><span class="icon">🏆</span><span class="nav-text">Top</span></button>
            </nav>
            <div class="sidebar-footer">
                <button class="upload-btn" id="uploadBtn"><span class="icon">➕</span><span class="upload-text">Upload</span></button>
                <div class="user-info" id="authSection">
                    <img class="user-avatar" id="userAvatar" src="">
                    <span class="user-email" id="userEmail"></span>
                    <span class="logout-icon" id="logoutBtn">🚪</span>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <div id="libraryPanel" class="panel active">
                <div class="panel-header">
                    <h1>📚 Library Musik</h1>
                    <div class="search-box"><input type="text" id="searchInput" placeholder="Cari lagu..."></div>
                </div>
                <div style="display: flex; justify-content: flex-end; margin-bottom: 16px;">
                    <button class="sort-btn" id="sortBtn">Sort by 📅 Recent</button>
                </div>
                <div id="libraryGrid" class="songs-grid"><div class="empty-state"><span>🎵</span>Memuat...</div></div>
            </div>

            <div id="likedPanel" class="panel">
                <div class="panel-header"><h1>❤️ Lagu Disukai</h1></div>
                <div id="likedGrid" class="songs-grid"><div class="empty-state"><span>❤️</span>Belum ada</div></div>
            </div>

            <div id="playlistPanel" class="panel">
                <div class="panel-header"><h1>📋 Playlist Saya</h1><button class="create-btn" id="createPlaylistBtn">+ Playlist Baru</button></div>
                <div id="playlistsGrid" class="songs-grid"><div class="empty-state"><span>📋</span>Belum ada playlist</div></div>
            </div>

            <div id="topPanel" class="panel">
                <div class="panel-header"><h1>🏆 Top Global</h1></div>
                <div id="topGrid" class="songs-grid"><div class="empty-state"><span>🏆</span>Memuat...</div></div>
            </div>

            <div id="uploadPanel" class="panel">
                <div class="panel-header"><h1>⬆️ Upload Lagu</h1></div>
                <div class="upload-form">
                    <div class="form-group"><label>🎵 Nama Lagu</label><input type="text" id="songName" placeholder="Contoh: Blinding Lights"></div>
                    <div class="form-group"><label>🎤 Penyanyi</label><input type="text" id="artistName" placeholder="Contoh: The Weeknd"></div>
                    <div class="form-group"><label>🎵 File MP3</label><input type="file" id="mp3File" accept="audio/mpeg"></div>
                    <div class="form-group"><label>🖼️ Cover (opsional)</label><input type="file" id="coverFile" accept="image/*"></div>
                    <button class="submit-btn" id="submitUploadBtn">🚀 Upload Lagu</button>
                    <div id="uploadStatus" class="upload-status"></div>
                </div>
            </div>
        </main>

        <!-- NOW PLAYING BAR -->
        <div id="nowPlayingBar" class="now-playing-bar hidden">
            <div class="player-info"><img id="playerCover" class="player-cover"><div><div id="playerTitle" class="player-title">-</div><div id="playerArtist" class="player-artist">-</div></div></div>
            <div class="player-controls"><button class="control-btn" id="prevBtn">⏮️</button><button class="control-btn play-pause" id="playPauseBtn">▶️</button><button class="control-btn" id="nextBtn">⏭️</button></div>
            <div class="player-progress"><span id="currentTime">0:00</span><input type="range" id="progressBar" value="0" min="0" max="100"><span id="totalTime">0:00</span></div>
            <div class="volume-control"><span>🔊</span><input type="range" id="volumeSlider" min="0" max="100" value="70"></div>
        </div>
    </div>

    <script>
        // ============================================
        // YAMIFY - FULLY FUNCTIONAL
        // ============================================
        
        const SUPABASE_URL = 'https://vsonrlptlfuomdawpewa.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_s6ifPt76DmLW9DJaUD_6cw_SQnbiblp';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Global state
        let currentUser = null;
        let allSongs = [];
        let userLikedSongs = new Set();
        let audioElement = null;
        let isPlaying = false;
        let currentPlaylist = [];
        let currentSongIndex = 0;
        let currentSort = 'recent';
        let searchQuery = '';
        
        // ========== AUTH ==========
        async function getCurrentUser() {
            const { data: { session } } = await supabase.auth.getSession();
            currentUser = session?.user || null;
            if (currentUser) {
                document.getElementById('userEmail').innerText = currentUser.email;
                document.getElementById('userAvatar').src = currentUser.user_metadata?.avatar_url || `https://ui-avatars.com/api/?background=1DB954&color=fff&name=${currentUser.email}`;
                document.getElementById('authSection').style.display = 'flex';
                await loadLikedSongs();
            } else {
                window.location.href = '/index.html';
            }
        }
        
        async function logoutUser() {
            await supabase.auth.signOut();
            window.location.href = '/index.html';
        }
        
        // ========== LOAD SONGS ==========
        async function loadAllSongs() {
            const { data, error } = await supabase.from('songs').select('*').order('created_at', { ascending: false });
            if (error) { console.error('Error:', error); return; }
            allSongs = data || [];
            renderLibrary();
            renderTopCharts();
        }
        
        function renderLibrary() {
            const container = document.getElementById('libraryGrid');
            if (!container) return;
            
            let filtered = [...allSongs];
            if (searchQuery) {
                filtered = filtered.filter(s => s.title.toLowerCase().includes(searchQuery.toLowerCase()) || s.artist.toLowerCase().includes(searchQuery.toLowerCase()));
            }
            
            switch(currentSort) {
                case 'az': filtered.sort((a,b) => a.title.localeCompare(b.title)); break;
                case 'za': filtered.sort((a,b) => b.title.localeCompare(a.title)); break;
                case 'plays': filtered.sort((a,b) => (b.play_count||0) - (a.play_count||0)); break;
                default: filtered.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
            }
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><span>🎵</span><br>Belum ada lagu<br><button onclick="showPanel(\'upload\')" style="margin-top:12px;background:#1DB954;border:none;padding:8px 20px;border-radius:500px;color:#000;cursor:pointer;">+ Upload Lagu</button></div>';
                return;
            }
            
            container.innerHTML = filtered.map(song => `
                <div class="song-card" onclick="playSongById('${song.id}')">
                    <div class="song-cover-wrapper">
                        <img class="song-cover" src="${song.cover_url || 'https://picsum.photos/200/200'}" onerror="this.src='https://picsum.photos/200/200'">
                        <div class="play-overlay" onclick="event.stopPropagation(); playSongById('${song.id}')"><span>▶️</span></div>
                    </div>
                    <div class="song-title">${escapeHtml(song.title)}</div>
                    <div class="song-artist">${escapeHtml(song.artist)}</div>
                    <div class="song-duration">${formatDuration(song.duration)} • 🎧 ${song.play_count || 0}</div>
                </div>
            `).join('');
        }
        
        function renderTopCharts() {
            const container = document.getElementById('topGrid');
            if (!container) return;
            const top = [...allSongs].sort((a,b) => (b.play_count||0) - (a.play_count||0)).slice(0, 20);
            if (top.length === 0) { container.innerHTML = '<div class="empty-state"><span>🏆</span><br>Belum ada data</div>'; return; }
            container.innerHTML = top.map((song, i) => `
                <div class="song-card" onclick="playSongById('${song.id}')">
                    <div class="song-cover-wrapper"><img class="song-cover" src="${song.cover_url || 'https://picsum.photos/200/200'}" onerror="this.src='https://picsum.photos/200/200'"><div class="play-overlay" onclick="event.stopPropagation(); playSongById('${song.id}')"><span>▶️</span></div></div>
                    <div class="song-title">${i+1}. ${escapeHtml(song.title)}</div>
                    <div class="song-artist">${escapeHtml(song.artist)}</div>
                    <div class="song-duration">🏆 ${song.play_count || 0} plays</div>
                </div>
            `).join('');
        }
        
        // ========== PLAYER ==========
        function initPlayer() {
            if (audioElement) return;
            audioElement = new Audio();
            audioElement.addEventListener('timeupdate', () => {
                if (audioElement.duration) {
                    document.getElementById('progressBar').value = (audioElement.currentTime / audioElement.duration) * 100;
                    document.getElementById('currentTime').innerText = formatDuration(audioElement.currentTime);
                    document.getElementById('totalTime').innerText = formatDuration(audioElement.duration);
                }
            });
            audioElement.addEventListener('ended', () => nextSong());
            audioElement.addEventListener('play', () => { isPlaying = true; document.getElementById('playPauseBtn').innerHTML = '⏸️'; });
            audioElement.addEventListener('pause', () => { isPlaying = false; document.getElementById('playPauseBtn').innerHTML = '▶️'; });
            
            document.getElementById('playPauseBtn')?.addEventListener('click', () => {
                if (isPlaying) audioElement.pause();
                else audioElement.play();
            });
            document.getElementById('prevBtn')?.addEventListener('click', prevSong);
            document.getElementById('nextBtn')?.addEventListener('click', nextSong);
            document.getElementById('progressBar')?.addEventListener('input', (e) => {
                if (audioElement.duration) audioElement.currentTime = (e.target.value / 100) * audioElement.duration;
            });
            document.getElementById('volumeSlider')?.addEventListener('input', (e) => { if (audioElement) audioElement.volume = e.target.value / 100; });
        }
        
        function playSong(song, playlist = null) {
            if (!song || !song.mp3_url) { alert('Gagal memutar lagu'); return; }
            if (!audioElement) initPlayer();
            currentPlaylist = playlist || allSongs;
            currentSongIndex = currentPlaylist.findIndex(s => s.id === song.id);
            audioElement.src = song.mp3_url;
            audioElement.play();
            document.getElementById('nowPlayingBar').classList.remove('hidden');
            document.getElementById('playerTitle').innerText = song.title;
            document.getElementById('playerArtist').innerText = song.artist;
            document.getElementById('playerCover').src = song.cover_url || 'https://picsum.photos/50/50';
            
            // Update play count
            supabase.from('songs').update({ play_count: (song.play_count||0)+1 }).eq('id', song.id);
            // Add to recently played
            if (currentUser) {
                supabase.from('recently_played').insert([{ user_id: currentUser.id, song_id: song.id, played_at: new Date() }]);
            }
        }
        
        function playSongById(id) {
            const song = allSongs.find(s => s.id === id);
            if (song) playSong(song);
        }
        
        function nextSong() {
            if (currentPlaylist.length) {
                currentSongIndex = (currentSongIndex + 1) % currentPlaylist.length;
                playSong(currentPlaylist[currentSongIndex], currentPlaylist);
            }
        }
        
        function prevSong() {
            if (currentPlaylist.length) {
                currentSongIndex = (currentSongIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
                playSong(currentPlaylist[currentSongIndex], currentPlaylist);
            }
        }
        
        // ========== LIKED SONGS ==========
        async function loadLikedSongs() {
            if (!currentUser) return;
            const { data } = await supabase.from('liked_songs').select('song_id').eq('user_id', currentUser.id);
            userLikedSongs.clear();
            data?.forEach(item => userLikedSongs.add(item.song_id));
            renderLikedSongs();
        }
        
        async function renderLikedSongs() {
            const container = document.getElementById('likedGrid');
            if (!container) return;
            const liked = allSongs.filter(s => userLikedSongs.has(s.id));
            if (liked.length === 0) { container.innerHTML = '<div class="empty-state"><span>❤️</span><br>Belum ada lagu disukai</div>'; return; }
            container.innerHTML = liked.map(song => `
                <div class="song-card" onclick="playSongById('${song.id}')">
                    <div class="song-cover-wrapper"><img class="song-cover" src="${song.cover_url || 'https://picsum.photos/200/200'}"><div class="play-overlay" onclick="event.stopPropagation(); playSongById('${song.id}')"><span>▶️</span></div></div>
                    <div class="song-title">${escapeHtml(song.title)}</div>
                    <div class="song-artist">${escapeHtml(song.artist)}</div>
                </div>
            `).join('');
        }
        
        async function toggleLike(songId) {
            if (!currentUser) { alert('Login dulu ya!'); return; }
            if (userLikedSongs.has(songId)) {
                await supabase.from('liked_songs').delete().eq('user_id', currentUser.id).eq('song_id', songId);
                userLikedSongs.delete(songId);
                showToast('💔 Dihapus dari favorit');
            } else {
                await supabase.from('liked_songs').insert([{ user_id: currentUser.id, song_id: songId }]);
                userLikedSongs.add(songId);
                showToast('❤️ Ditambahkan ke favorit');
            }
            renderLikedSongs();
            renderLibrary();
        }
        
        // ========== PLAYLIST ==========
        async function loadUserPlaylists() {
            if (!currentUser) return;
            const { data } = await supabase.from('playlists').select('*').eq('user_id', currentUser.id);
            const container = document.getElementById('playlistsGrid');
            if (!container) return;
            if (!data?.length) { container.innerHTML = '<div class="empty-state"><span>📋</span><br>Belum ada playlist</div>'; return; }
            container.innerHTML = data.map(pl => `
                <div class="song-card" onclick="alert('Playlist: ${escapeHtml(pl.name)} - Fitur tambah lagu menyusul')">
                    <div class="song-cover-wrapper"><div style="font-size:48px;text-align:center;padding:20px;">📋</div></div>
                    <div class="song-title">${escapeHtml(pl.name)}</div>
                    <div class="song-artist">${new Date(pl.created_at).toLocaleDateString()}</div>
                </div>
            `).join('');
        }
        
        async function createNewPlaylist() {
            if (!currentUser) { alert('Login dulu ya!'); return; }
            const name = prompt('Nama playlist baru:');
            if (!name) return;
            await supabase.from('playlists').insert([{ name, user_id: currentUser.id }]);
            showToast(`✅ Playlist "${name}" dibuat`);
            await loadUserPlaylists();
        }
        
        // ========== UPLOAD ==========
        async function uploadSong() {
            if (!currentUser) { alert('Login dulu ya!'); return; }
            
            const title = document.getElementById('songName')?.value.trim();
            const artist = document.getElementById('artistName')?.value.trim();
            const mp3File = document.getElementById('mp3File')?.files[0];
            const coverFile = document.getElementById('coverFile')?.files[0];
            
            if (!title || !artist) { showUploadStatus('Isi judul dan artis!', 'error'); return; }
            if (!mp3File) { showUploadStatus('Pilih file MP3!', 'error'); return; }
            if (mp3File.type !== 'audio/mpeg') { showUploadStatus('File harus MP3!', 'error'); return; }
            
            showUploadStatus('Mengupload...', 'info');
            
            try {
                // Upload MP3
                const mp3FileName = `${Date.now()}_${mp3File.name.replace(/[^a-zA-Z0-9.-]/g, '_')}`;
                const { error: mp3Error } = await supabase.storage.from('songs').upload(mp3FileName, mp3File);
                if (mp3Error) throw new Error('Upload MP3 gagal');
                const { data: mp3Url } = supabase.storage.from('songs').getPublicUrl(mp3FileName);
                
                // Upload cover if exists
                let coverUrl = null;
                if (coverFile) {
                    const coverFileName = `cover_${Date.now()}_${coverFile.name.replace(/[^a-zA-Z0-9.-]/g, '_')}`;
                    await supabase.storage.from('covers').upload(coverFileName, coverFile);
                    const { data: coverPublic } = supabase.storage.from('covers').getPublicUrl(coverFileName);
                    coverUrl = coverPublic.publicUrl;
                }
                
                // Get duration
                let duration = 180;
                try {
                    const tempAudio = new Audio();
                    tempAudio.src = mp3Url.publicUrl;
                    await new Promise((resolve) => {
                        tempAudio.addEventListener('loadedmetadata', () => { duration = Math.floor(tempAudio.duration); resolve(); });
                        tempAudio.addEventListener('error', () => resolve());
                        setTimeout(resolve, 3000);
                    });
                } catch(e) {}
                
                // Save to database
                const { error } = await supabase.from('songs').insert([{
                    title, artist, duration,
                    cover_url: coverUrl || `https://picsum.photos/200/200?random=${Date.now()}`,
                    mp3_url: mp3Url.publicUrl,
                    user_id: currentUser.id,
                    user_email: currentUser.email,
                    play_count: 0
                }]);
                
                if (error) throw new Error(error.message);
                
                showUploadStatus('Upload berhasil!', 'success');
                showToast(`🎵 "${title}" berhasil diupload!`);
                
                document.getElementById('songName').value = '';
                document.getElementById('artistName').value = '';
                document.getElementById('mp3File').value = '';
                document.getElementById('coverFile').value = '';
                
                await loadAllSongs();
                showPanel('library');
                
            } catch (error) {
                showUploadStatus('Gagal: ' + error.message, 'error');
            }
        }
        
        function showUploadStatus(msg, type) {
            const div = document.getElementById('uploadStatus');
            if (!div) return;
            div.textContent = msg;
            div.className = 'upload-status ' + type;
            setTimeout(() => { if (type !== 'error') div.textContent = ''; }, 4000);
        }
        
        // ========== UI HELPERS ==========
        function showPanel(panelId) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`${panelId}Panel`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if (panelId === 'library') document.querySelector('.nav-item[data-panel="library"]')?.classList.add('active');
            if (panelId === 'liked') document.querySelector('.nav-item[data-panel="liked"]')?.classList.add('active');
            if (panelId === 'playlist') document.querySelector('.nav-item[data-panel="playlist"]')?.classList.add('active');
            if (panelId === 'top') document.querySelector('.nav-item[data-panel="top"]')?.classList.add('active');
            if (panelId === 'upload') document.querySelector('.nav-item[data-panel="library"]')?.classList.remove('active');
            
            if (panelId === 'liked') renderLikedSongs();
            if (panelId === 'playlist') loadUserPlaylists();
            if (panelId === 'top') renderTopCharts();
        }
        
        function filterSongs(query) { searchQuery = query; renderLibrary(); }
        
        function sortSongs(type) {
            currentSort = type;
            const texts = { recent: 'Sort by 📅 Recent', az: 'Sort by A → Z', za: 'Sort by Z → A', plays: 'Sort by 🔥 Most Played' };
            document.getElementById('sortBtn').innerHTML = texts[type];
            renderLibrary();
        }
        
        function formatDuration(seconds) {
            if (!seconds) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }
        
        function showToast(msg) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1DB954;color:#000;padding:12px 24px;border-radius:500px;z-index:1000;opacity:0;transition:0.2s;font-weight:600;';
                document.body.appendChild(toast);
            }
            toast.textContent = msg;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }
        
        // ========== EVENT LISTENERS ==========
        function setupEventListeners() {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => showPanel(item.dataset.panel));
            });
            document.getElementById('uploadBtn')?.addEventListener('click', () => showPanel('upload'));
            document.getElementById('submitUploadBtn')?.addEventListener('click', uploadSong);
            document.getElementById('searchInput')?.addEventListener('input', (e) => filterSongs(e.target.value));
            document.getElementById('logoutBtn')?.addEventListener('click', logoutUser);
            document.getElementById('createPlaylistBtn')?.addEventListener('click', createNewPlaylist);
            
            let sortIndex = 0;
            const sorts = ['recent', 'az', 'za', 'plays'];
            document.getElementById('sortBtn')?.addEventListener('click', () => {
                sortIndex = (sortIndex + 1) % sorts.length;
                sortSongs(sorts[sortIndex]);
            });
        }
        
        // ========== INIT ==========
        async function init() {
            await getCurrentUser();
            setupEventListeners();
            initPlayer();
            await loadAllSongs();
            await loadUserPlaylists();
            console.log('✅ Yamify ready!');
        }
        
        window.playSongById = playSongById;
        window.toggleLike = toggleLike;
        window.showPanel = showPanel;
        
        init();
    </script>
</body>
</html>
