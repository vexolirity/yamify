<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#1DB954">
    <title>Yamify - Streaming Musik</title>
    <link href="https://fonts.cdnfonts.com/css/circular-std" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-base: #000; --bg-card: #121212; --bg-highlight: #1A1A1A; --text-primary: #fff; --text-secondary: #B3B3B3; --accent: #1DB954; --border: #282828; }
        [data-theme="light"] { --bg-base: #F8F8F8; --bg-card: #fff; --bg-highlight: #F0F0F0; --text-primary: #121212; --text-secondary: #6A6A6A; --border: #E0E0E0; }
        body { font-family: 'Circular Std', sans-serif; background: var(--bg-base); color: var(--text-primary); height: 100vh; overflow: hidden; }
        .app { display: flex; flex-direction: column; height: 100vh; }
        .header { position: fixed; top: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; z-index: 30; border-bottom: 1px solid var(--border); }
        .logo { font-size: 26px; font-weight: 900; background: linear-gradient(135deg, #1DB954, #1ed760); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .header-actions { display: flex; align-items: center; gap: 16px; }
        .icon-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary); padding: 8px; border-radius: 500px; }
        .icon-btn:hover { color: var(--accent); }
        .user-menu { display: none; align-items: center; gap: 8px; background: var(--bg-highlight); padding: 4px 12px 4px 6px; border-radius: 500px; cursor: pointer; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .user-name { font-size: 14px; font-weight: 500; max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
        .logout-btn { background: none; border: none; font-size: 16px; cursor: pointer; padding: 6px; border-radius: 500px; }
        .logout-btn:hover { color: #E5484D; }
        .main { flex: 1; overflow-y: auto; padding: 80px 24px 100px; }
        .panel { display: none; animation: fadeInUp 0.3s ease; }
        .panel.active { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .panel-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 28px; }
        .panel-header h1 { font-size: 32px; font-weight: 800; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .songs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .song-card { background: var(--bg-card); border-radius: 10px; padding: 16px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .song-card:hover { background: var(--bg-highlight); transform: translateY(-4px); border-color: var(--border); }
        .song-cover-wrapper { position: relative; margin-bottom: 12px; }
        .song-cover { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 6px; }
        .play-overlay { position: absolute; bottom: 8px; right: 8px; background: var(--accent); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transform: translateY(8px); transition: 0.2s; cursor: pointer; }
        .song-card:hover .play-overlay { opacity: 1; transform: translateY(0); }
        .play-overlay span { font-size: 18px; color: #000; }
        .like-btn-card { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; cursor: pointer; backdrop-filter: blur(4px); }
        .song-card:hover .like-btn-card { opacity: 1; }
        .like-btn-card.liked { opacity: 1; background: var(--accent); }
        .song-title { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-artist { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.98); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 8px 16px 24px; z-index: 25; }
        .nav-btn { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 12px; border-radius: 10px; cursor: pointer; flex: 1; max-width: 70px; }
        .nav-btn .icon { font-size: 22px; color: var(--text-secondary); }
        .nav-btn .label { font-size: 11px; font-weight: 500; color: var(--text-secondary); }
        .nav-btn.active .icon, .nav-btn.active .label { color: var(--accent); }
        .now-playing-bar { position: fixed; bottom: 72px; left: 0; right: 0; background: rgba(18,18,18,0.98); backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding: 12px 20px; display: none; align-items: center; gap: 16px; z-index: 20; flex-wrap: wrap; }
        .now-playing-bar:not(.hidden) { display: flex; }
        .player-info { display: flex; align-items: center; gap: 12px; min-width: 180px; flex: 1; }
        .player-cover { width: 52px; height: 52px; border-radius: 6px; object-fit: cover; }
        .player-title { font-weight: 600; font-size: 14px; }
        .player-artist { font-size: 12px; color: var(--text-secondary); }
        .player-controls { display: flex; gap: 16px; align-items: center; }
        .ctrl-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-primary); padding: 8px; border-radius: 500px; }
        .ctrl-btn:hover { color: var(--accent); }
        .play-btn { background: var(--accent); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #000; }
        .player-progress { display: flex; align-items: center; gap: 12px; flex: 2; min-width: 180px; }
        .progress-container { flex: 1; position: relative; }
        .progress-bg { position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--border); border-radius: 2px; }
        .progress-fill { position: absolute; top: 0; left: 0; height: 4px; background: var(--accent); border-radius: 2px; width: 0%; }
        #progressBar { width: 100%; height: 4px; -webkit-appearance: none; background: transparent; position: relative; z-index: 1; cursor: pointer; }
        .current-time, .total-time { font-size: 12px; color: var(--text-secondary); min-width: 40px; }
        .volume-control { display: flex; align-items: center; gap: 8px; }
        #volumeSlider { width: 80px; height: 4px; -webkit-appearance: none; background: var(--border); border-radius: 2px; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal.hidden { display: none; }
        .modal-content { background: var(--bg-card); border-radius: 16px; width: 90%; max-width: 450px; max-height: 80vh; overflow-y: auto; border: 1px solid var(--border); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; border-bottom: 1px solid var(--border); }
        .close-modal { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-dim); }
        .empty-state { text-align: center; padding: 60px 24px; color: var(--text-secondary); }
        .upload-dropzone { border: 2px dashed var(--border); border-radius: 16px; padding: 48px 24px; text-align: center; margin: 20px; cursor: pointer; }
        .upload-dropzone:hover { border-color: var(--accent); background: var(--bg-highlight); }
        .form-group { margin-bottom: 20px; }
        .form-group input, .form-group select { width: 100%; background: var(--bg-highlight); border: 1px solid var(--border); padding: 12px 16px; border-radius: 10px; color: var(--text-primary); }
        .submit-btn { width: 100%; background: var(--accent); border: none; padding: 14px; border-radius: 500px; font-weight: 700; cursor: pointer; color: #000; }
        .upload-status { margin: 16px 20px 20px; padding: 12px; border-radius: 10px; text-align: center; }
        .upload-status.success { background: rgba(16,185,129,0.2); color: #10B981; }
        .upload-status.error { background: rgba(229,72,77,0.2); color: #E5484D; }
        .playlists-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
        .playlist-card { background: var(--bg-card); border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; }
        .playlist-icon { font-size: 48px; margin-bottom: 12px; }
        .radio-stations { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .radio-card { background: var(--bg-card); border-radius: 16px; padding: 24px; text-align: center; cursor: pointer; }
        .eq-bands { display: flex; flex-direction: column; gap: 16px; padding: 20px; }
        .eq-band { display: flex; align-items: center; gap: 12px; }
        .eq-band input { flex: 1; }
        .hidden { display: none; }
        @media (max-width: 600px) { .songs-grid { grid-template-columns: repeat(2, 1fr); } .user-name { display: none; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">
    <header class="header">
        <div class="logo" onclick="showPanel('library')">yamify</div>
        <div class="header-actions">
            <button class="icon-btn" id="searchBtn" onclick="toggleSearch()">🔍</button>
            <button class="icon-btn" id="settingsBtn" onclick="showSettings()">⚙️</button>
            <div class="user-menu" id="userMenu">
                <img class="user-avatar" id="userAvatar" src="">
                <span class="user-name" id="userName"></span>
                <button class="logout-btn" id="logoutBtn">🚪</button>
            </div>
        </div>
    </header>

    <div id="searchOverlay" class="modal hidden">
        <div class="modal-content" style="max-width:500px">
            <div class="modal-header"><h3>Cari Lagu</h3><button onclick="closeSearch()">✕</button></div>
            <input type="text" id="globalSearchInput" placeholder="Cari lagu, artis..." style="margin:16px;padding:12px;width:calc(100% - 32px);background:var(--bg-highlight);border:1px solid var(--border);border-radius:500px;color:var(--text-primary)">
            <div id="searchResults" style="padding:16px"></div>
        </div>
    </div>

    <div id="settingsModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header"><h3>Pengaturan</h3><button onclick="closeSettings()">✕</button></div>
            <div style="padding:20px">
                <div class="form-group"><label>Tema</label><div class="theme-options" style="display:flex;gap:10px"><button class="theme-btn" data-theme="dark">🌙 Dark</button><button class="theme-btn" data-theme="light">☀️ Light</button></div></div>
                <div class="form-group"><label>Kualitas Audio</label><select id="qualitySelect"><option value="low">Rendah</option><option value="medium" selected>Sedang</option><option value="high">Tinggi</option></select></div>
                <div class="form-group"><label><input type="checkbox" id="dataSaver"> Hemat Data</label></div>
                <div class="form-group"><label>Crossfade (detik)</label><input type="range" id="crossfadeSlider" min="0" max="12" value="0"><span id="crossfadeValue">0</span></div>
                <button id="clearCacheBtn" style="background:rgba(229,72,77,0.15);border:1px solid #E5484D;padding:10px;border-radius:500px;color:#E5484D;width:100%">Hapus Cache</button>
            </div>
        </div>
    </div>

    <main class="main" id="mainContent">
        <div class="panel active" id="libraryPanel"><div class="panel-header"><h1>Semua Lagu</h1><button class="sort-btn" id="sortBtn">Sort by 📅</button></div><div class="songs-grid" id="libraryGrid"></div></div>
        <div class="panel" id="likedPanel"><div class="panel-header"><h1>Lagu Disukai</h1><span id="likedCount">0 lagu</span></div><div class="songs-grid" id="likedGrid"></div></div>
        <div class="panel" id="playlistPanel"><div class="panel-header"><h1>Playlist Saya</h1><button class="create-btn" id="createPlaylistBtn">+ Buat Playlist</button></div><div class="playlists-grid" id="playlistsGrid"></div></div>
        <div class="panel" id="recentPanel"><div class="panel-header"><h1>Baru Diputar</h1></div><div class="songs-grid" id="recentlyPlayedGrid"></div></div>
        <div class="panel" id="topPanel"><div class="panel-header"><h1>Top Global</h1></div><div id="topGrid"></div></div>
        <div class="panel" id="radioPanel"><div class="panel-header"><h1>Radio</h1></div><div class="radio-stations" id="radioStations"></div></div>
        <div class="panel" id="equalizerPanel"><div class="panel-header"><h1>Equalizer</h1><button id="eqPresetBtn">Preset</button></div><div id="equalizerContainer"></div><div id="eqPresets" style="display:none;padding:16px;display:flex;flex-wrap:wrap;gap:10px"><button data-preset="normal">Normal</button><button data-preset="bass">Bass</button><button data-preset="treble">Treble</button><button data-preset="vocal">Vocal</button></div></div>
        <div class="panel" id="uploadPanel">
            <div class="panel-header"><h1>Upload Musik</h1></div>
            <div class="upload-dropzone" id="dropzone"><span>📁</span><p>Drag & drop file MP3</p><button id="selectFileBtn">Pilih File</button><input type="file" id="mp3File" accept="audio/mpeg" style="display:none"></div>
            <div id="uploadDetails" style="display:none;padding:20px">
                <div class="form-group"><label>Judul Lagu</label><input type="text" id="songTitle" placeholder="Judul lagu"></div>
                <div class="form-group"><label>Artis</label><input type="text" id="songArtist" placeholder="Nama artis"></div>
                <div class="form-group"><label>Genre</label><select id="songGenre"><option>Pop</option><option>Rock</option><option>Hip Hop</option><option>Electronic</option></select></div>
                <div class="form-group"><label>Cover (opsional)</label><input type="file" id="coverFile" accept="image/*"><div id="coverPreview"></div></div>
                <button class="submit-btn" id="uploadSubmitBtn">🚀 Upload Sekarang</button>
            </div>
            <div id="uploadStatus" class="upload-status"></div>
        </div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-btn active" data-panel="library"><span class="icon">🏠</span><span class="label">Beranda</span></button>
        <button class="nav-btn" data-panel="liked"><span class="icon">❤️</span><span class="label">Disukai</span></button>
        <button class="nav-btn" data-panel="playlist"><span class="icon">📋</span><span class="label">Playlist</span></button>
        <button class="nav-btn" data-panel="recent"><span class="icon">🕐</span><span class="label">Baru</span></button>
        <button class="nav-btn" data-panel="top"><span class="icon">🏆</span><span class="label">Top</span></button>
        <button class="nav-btn" data-panel="radio"><span class="icon">📻</span><span class="label">Radio</span></button>
        <button class="nav-btn" data-panel="equalizer"><span class="icon">🎚️</span><span class="label">EQ</span></button>
        <button class="nav-btn" data-panel="upload"><span class="icon">⬆️</span><span class="label">Upload</span></button>
    </nav>

    <div id="nowPlayingBar" class="now-playing-bar hidden">
        <div class="player-info"><img id="playerCover" class="player-cover"><div><div id="playerTitle" class="player-title">-</div><div id="playerArtist" class="player-artist">-</div></div><button id="playerLikeBtn" style="background:none;border:none;font-size:20px">🤍</button></div>
        <div class="player-controls"><button class="ctrl-btn" id="shuffleBtn">🔀</button><button class="ctrl-btn" id="prevBtn">⏮</button><button class="ctrl-btn play-btn" id="playPauseBtn">▶</button><button class="ctrl-btn" id="nextBtn">⏭</button><button class="ctrl-btn" id="repeatBtn">🔁</button></div>
        <div class="player-progress"><span id="currentTime" class="current-time">0:00</span><div class="progress-container"><div class="progress-bg"></div><div class="progress-fill" id="progressFill"></div><input type="range" id="progressBar" value="0" min="0" max="100"></div><span id="totalTime" class="total-time">0:00</span></div>
        <div class="volume-control"><span>🔊</span><input type="range" id="volumeSlider" min="0" max="100" value="70"></div>
    </div>
</div>

<script src="supabase-config.js"></script>
<script src="auth.js"></script>
<script src="library.js"></script>
<script src="social.js"></script>
<script src="playlist.js"></script>
<script src="stats.js"></script>
<script src="effects.js"></script>
<script src="player.js"></script>
<script src="radio.js"></script>
<script src="realtime.js"></script>
<script src="search.js"></script>
<script src="settings.js"></script>
<script src="upload.js"></script>

<script>
    let currentSort = 'recent';
    let searchQuery = '';

    async function loadAllSongs() {
        const { data, error } = await supabase.from('songs').select('*').order('created_at', { ascending: false });
        if (!error) { window.allSongs = data || []; renderLibrary(); renderTopCharts(); }
    }

    function renderLibrary() {
        const container = document.getElementById('libraryGrid');
        if (!container) return;
        let songs = [...window.allSongs];
        if (searchQuery) songs = songs.filter(s => s.title.toLowerCase().includes(searchQuery) || s.artist.toLowerCase().includes(searchQuery));
        if (currentSort === 'az') songs.sort((a,b) => a.title.localeCompare(b.title));
        else if (currentSort === 'za') songs.sort((a,b) => b.title.localeCompare(a.title));
        else if (currentSort === 'plays') songs.sort((a,b) => (b.play_count||0) - (a.play_count||0));
        else songs.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
        if (!songs.length) { container.innerHTML = '<div class="empty-state"><span>🎵</span><p>Belum ada lagu</p></div>'; return; }
        container.innerHTML = songs.map(song => `
            <div class="song-card">
                <div class="song-cover-wrapper"><img class="song-cover" src="${song.cover_url || 'https://picsum.photos/200/200'}" onerror="this.src='https://picsum.photos/200/200'"><div class="play-overlay" onclick="event.stopPropagation(); playSongById('${song.id}')"><span>▶️</span></div><div class="like-btn-card ${window.userLikedSongs?.has(song.id) ? 'liked' : ''}" onclick="event.stopPropagation(); toggleLike('${song.id}')"><span>${window.userLikedSongs?.has(song.id) ? '❤️' : '🤍'}</span></div></div>
                <div class="song-title" onclick="playSongById('${song.id}')">${escapeHtml(song.title)}</div>
                <div class="song-artist" onclick="playSongById('${song.id}')">${escapeHtml(song.artist)}</div>
            </div>
        `).join('');
    }

    function renderTopCharts() {
        const container = document.getElementById('topGrid');
        if (!container) return;
        const top = [...window.allSongs].sort((a,b) => (b.play_count||0) - (a.play_count||0)).slice(0,20);
        if (!top.length) { container.innerHTML = '<div class="empty-state"><span>🏆</span><p>Belum ada data</p></div>'; return; }
        container.innerHTML = top.map((song,i) => `<div class="top-chart-item" style="display:flex;align-items:center;gap:16px;padding:12px;background:var(--bg-card);border-radius:10px;margin-bottom:8px;cursor:pointer" onclick="playSongById('${song.id}')"><div style="font-size:24px;font-weight:800;color:var(--accent);width:50px">#${i+1}</div><img src="${song.cover_url||'https://picsum.photos/50/50'}" style="width:50px;height:50px;border-radius:6px"><div><div style="font-weight:600">${escapeHtml(song.title)}</div><div style="font-size:12px;color:var(--text-secondary)">${escapeHtml(song.artist)}</div></div><div style="margin-left:auto">${song.play_count||0} plays</div></div>`).join('');
    }

    function playSongById(id) {
        const song = window.allSongs.find(s => s.id === id);
        if (song && window.playSong) window.playSong(song);
    }

    async function toggleLike(songId) {
        if (!window.currentUser) { showToast('Login dulu', 1500); return; }
        if (window.userLikedSongs.has(songId)) {
            await supabase.from('liked_songs').delete().eq('user_id', window.currentUser.id).eq('song_id', songId);
            window.userLikedSongs.delete(songId);
        } else {
            await supabase.from('liked_songs').insert([{ user_id: window.currentUser.id, song_id: songId }]);
            window.userLikedSongs.add(songId);
        }
        renderLibrary();
        if (window.renderLikedSongs) window.renderLikedSongs();
        showToast(window.userLikedSongs.has(songId) ? '❤️ Disukai' : '💔 Dihapus', 1000);
    }

    function showPanel(panel) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById(`${panel}Panel`).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.nav-btn[data-panel="${panel}"]`).classList.add('active');
        if (panel === 'liked' && window.renderLikedSongs) window.renderLikedSongs();
        if (panel === 'top') renderTopCharts();
        if (panel === 'playlist' && window.renderPlaylists) window.renderPlaylists();
        if (panel === 'radio' && window.loadRadioStations) window.loadRadioStations();
        if (panel === 'equalizer' && window.initEqualizer) window.initEqualizer();
    }

    function toggleSearch() { document.getElementById('searchOverlay').classList.toggle('hidden'); }
    function closeSearch() { document.getElementById('searchOverlay').classList.add('hidden'); }
    function showSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }
    function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }

    document.getElementById('sortBtn')?.addEventListener('click', () => {
        const sorts = ['recent', 'az', 'za', 'plays'];
        currentSort = sorts[(sorts.indexOf(currentSort) + 1) % sorts.length];
        renderLibrary();
    });

    document.querySelectorAll('.nav-btn').forEach(btn => btn.addEventListener('click', () => showPanel(btn.dataset.panel)));
    document.getElementById('createPlaylistBtn')?.addEventListener('click', () => window.createNewPlaylist?.());

    window.loadAllSongs = loadAllSongs;
    window.renderLibrary = renderLibrary;
    window.renderTopCharts = renderTopCharts;
    window.playSongById = playSongById;
    window.toggleLike = toggleLike;
    window.showPanel = showPanel;
    window.toggleSearch = toggleSearch;
    window.closeSearch = closeSearch;
    window.showSettings = showSettings;
    window.closeSettings = closeSettings;

    document.addEventListener('DOMContentLoaded', async () => {
        await checkAuthAndLoad();
        await loadAllSongs();
        if (window.loadLikedSongs) await window.loadLikedSongs();
        if (window.loadUserPlaylists) await window.loadUserPlaylists();
        if (window.initSettings) window.initSettings();
        if (window.initSearch) window.initSearch();
        console.log('✅ Yamify siap!');
    });
</script>
</body>
</html>
