<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Yamify - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">
                <span>🎵</span>
                <h1>Yamify</h1>
            </div>

            <nav class="nav-menu">
                <button class="nav-item active" data-panel="library">
                    <span class="icon">🏠</span>
                    <span class="nav-text">Beranda</span>
                </button>
                <button class="nav-item" data-panel="liked">
                    <span class="icon">❤️</span>
                    <span class="nav-text">Disukai</span>
                </button>
                <button class="nav-item" data-panel="playlist">
                    <span class="icon">📋</span>
                    <span class="nav-text">Playlist</span>
                </button>
                <button class="nav-item" data-panel="recent">
                    <span class="icon">🕐</span>
                    <span class="nav-text">Baru</span>
                </button>
                <button class="nav-item" data-panel="top">
                    <span class="icon">🏆</span>
                    <span class="nav-text">Top</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <button class="upload-btn" id="uploadBtn">
                    <span class="icon">➕</span>
                    <span class="upload-text">Upload</span>
                </button>

                <div class="user-info" id="authSection">
                    <img class="user-avatar" id="userAvatar" src="">
                    <span class="user-email" id="userEmail"></span>
                    <span class="logout-icon" id="logoutBtn">🚪</span>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- Library Panel -->
            <div id="libraryPanel" class="panel active">
                <div class="panel-header">
                    <h1>📚 Library Musik</h1>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Cari lagu...">
                    </div>
                </div>
                <div id="libraryGrid" class="songs-grid"></div>
            </div>

            <!-- Liked Songs Panel -->
            <div id="likedPanel" class="panel">
                <div class="panel-header">
                    <h1>❤️ Lagu Disukai</h1>
                </div>
                <div id="likedGrid" class="songs-grid"></div>
            </div>

            <!-- Playlist Panel -->
            <div id="playlistPanel" class="panel">
                <div class="panel-header">
                    <h1>📋 Playlist Saya</h1>
                    <button class="create-btn" id="createPlaylistBtn">+ Playlist Baru</button>
                </div>
                <div id="playlistsGrid" class="playlists-container"></div>
            </div>

            <!-- Recently Played Panel -->
            <div id="recentPanel" class="panel">
                <div class="panel-header">
                    <h1>🕐 Baru Diputar</h1>
                </div>
                <div id="recentlyPlayedGrid" class="songs-grid"></div>
            </div>

            <!-- Top Global Panel -->
            <div id="topPanel" class="panel">
                <div class="panel-header">
                    <h1>🏆 Top Global</h1>
                </div>
                <div id="topChartsGrid" class="songs-grid"></div>
            </div>

            <!-- Upload Panel -->
            <div id="uploadPanel" class="panel">
                <div class="panel-header">
                    <h1>⬆️ Upload Lagu</h1>
                </div>
                <div class="upload-form">
                    <div class="form-group">
                        <label>🎵 Nama Lagu</label>
                        <input type="text" id="songName" placeholder="Contoh: Blinding Lights">
                    </div>
                    <div class="form-group">
                        <label>🎤 Penyanyi</label>
                        <input type="text" id="artistName" placeholder="Contoh: The Weeknd">
                    </div>
                    <div class="form-group">
                        <label>🎵 File MP3</label>
                        <input type="file" id="mp3File" accept="audio/mpeg">
                    </div>
                    <div class="form-group">
                        <label>🖼️ Cover (opsional)</label>
                        <input type="file" id="coverFile" accept="image/*">
                    </div>
                    <button class="submit-btn" id="submitUploadBtn">🚀 Upload Lagu</button>
                    <div id="uploadStatus" class="upload-status"></div>
                </div>
            </div>
        </main>

        <!-- NOW PLAYING BAR -->
        <div id="nowPlayingBar" class="now-playing-bar hidden">
            <div class="player-info">
                <img id="playerCover" class="player-cover" src="https://picsum.photos/50/50">
                <div class="player-details">
                    <div id="playerTitle" class="player-title">-</div>
                    <div id="playerArtist" class="player-artist">-</div>
                </div>
            </div>
            <div class="player-controls">
                <button class="control-btn" id="prevBtn">⏮️</button>
                <button class="control-btn play-pause" id="playPauseBtn">▶️</button>
                <button class="control-btn" id="nextBtn">⏭️</button>
            </div>
            <div class="player-progress">
                <span id="currentTime" class="current-time">0:00</span>
                <input type="range" id="progressBar" value="0" min="0" max="100">
                <span id="totalTime" class="total-time">0:00</span>
            </div>
            <div class="volume-control">
                <span>🔊</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="70">
            </div>
        </div>
    </div>

    <!-- Share Modal -->
    <div id="shareModal" class="modal">
        <div class="modal-content">
            <h3>🎵 Share Lagu</h3>
            <input type="text" id="shareLink" readonly>
            <div class="modal-buttons">
                <button id="copyLinkBtn">📋 Salin</button>
                <button id="closeModalBtn">Tutup</button>
            </div>
        </div>
    </div>

    <script src="supabase-client.js"></script>
    <script src="upload.js"></script>
    <script src="player.js"></script>
    <script src="script.js"></script>
</body>
</html>
