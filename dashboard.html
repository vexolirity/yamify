<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yamify - Musik Kamu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #000; --card: #121212; --text: #fff; --text-sec: #b3b3b3; --accent: #1DB954; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        .app { display: flex; flex-direction: column; height: 100vh; }
        .header { position: fixed; top: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); padding: 12px 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #282828; z-index: 30; }
        .logo { font-size: 24px; font-weight: 900; background: linear-gradient(135deg, #1DB954, #1ed760); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .user-menu { display: none; align-items: center; gap: 8px; background: #1a1a1a; padding: 4px 12px; border-radius: 500px; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; }
        .logout-btn { background: none; border: none; color: #b3b3b3; font-size: 16px; cursor: pointer; padding: 4px; }
        .logout-btn:hover { color: #E5484D; }
        .main { flex: 1; overflow-y: auto; padding: 80px 20px 100px; }
        .panel { display: none; }
        .panel.active { display: block; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .panel-header h1 { font-size: 28px; }
        .songs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
        .song-card { background: var(--card); border-radius: 10px; padding: 12px; cursor: pointer; transition: 0.2s; }
        .song-card:hover { background: #1a1a1a; transform: translateY(-4px); }
        .song-cover { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .song-title { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-artist { font-size: 12px; color: var(--text-sec); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0a0a0a; border-top: 1px solid #282828; display: flex; justify-content: space-around; padding: 8px 16px 20px; z-index: 25; }
        .nav-btn { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 12px; cursor: pointer; flex: 1; }
        .nav-btn .icon { font-size: 22px; color: #b3b3b3; }
        .nav-btn .label { font-size: 10px; color: #b3b3b3; }
        .nav-btn.active .icon, .nav-btn.active .label { color: var(--accent); }
        .now-playing { position: fixed; bottom: 70px; left: 0; right: 0; background: #121212; border-top: 1px solid #282828; padding: 10px 16px; display: none; align-items: center; gap: 12px; z-index: 20; }
        .now-playing:not(.hidden) { display: flex; }
        .np-cover { width: 48px; height: 48px; border-radius: 6px; }
        .np-controls { display: flex; gap: 16px; align-items: center; }
        .ctrl-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: white; }
        .play-btn { background: var(--accent); width: 40px; height: 40px; border-radius: 50%; color: black; }
        .progress-bar { flex: 1; height: 4px; background: #282828; border-radius: 2px; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); border-radius: 2px; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal.hidden { display: none; }
        .modal-content { background: var(--card); border-radius: 16px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; padding: 20px; }
        .empty { text-align: center; padding: 40px; color: #b3b3b3; }
        .upload-zone { border: 2px dashed #282828; border-radius: 16px; padding: 40px; text-align: center; margin-bottom: 20px; cursor: pointer; }
        .upload-zone:hover { border-color: var(--accent); }
        .form-group { margin-bottom: 16px; }
        .form-group input, .form-group select { width: 100%; background: #1a1a1a; border: 1px solid #282828; padding: 12px; border-radius: 8px; color: white; }
        .btn-submit { width: 100%; background: var(--accent); border: none; padding: 14px; border-radius: 500px; font-weight: 700; cursor: pointer; color: black; }
        .playlists-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
        .playlist-card { background: var(--card); border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; }
        .radio-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .radio-card { background: var(--card); border-radius: 16px; padding: 20px; text-align: center; cursor: pointer; }
        @media (max-width: 600px) { .songs-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo" onclick="showPanel('library')">yamify</div>
        <div class="user-menu" id="userMenu">
            <img class="user-avatar" id="userAvatar">
            <span class="user-name" id="userName"></span>
            <button class="logout-btn" id="logoutBtn">🚪</button>
        </div>
    </div>

    <div class="main">
        <!-- LIBRARY PANEL -->
        <div class="panel active" id="libraryPanel">
            <div class="panel-header"><h1>🎵 Semua Lagu</h1><button id="sortBtn" style="background:#1a1a1a;border:none;padding:8px 16px;border-radius:500px;color:white">Sort ↓</button></div>
            <div class="songs-grid" id="libraryGrid"><div class="empty">Memuat...</div></div>
        </div>

        <!-- LIKED PANEL -->
        <div class="panel" id="likedPanel">
            <div class="panel-header"><h1>❤️ Lagu Disukai</h1></div>
            <div class="songs-grid" id="likedGrid"></div>
        </div>

        <!-- PLAYLIST PANEL -->
        <div class="panel" id="playlistPanel">
            <div class="panel-header"><h1>📋 Playlist Saya</h1><button id="createPlaylistBtn" style="background:#1DB954;border:none;padding:8px 16px;border-radius:500px;font-weight:700">+ Baru</button></div>
            <div class="playlists-grid" id="playlistsGrid"></div>
        </div>

        <!-- RECENT PANEL -->
        <div class="panel" id="recentPanel">
            <div class="panel-header"><h1>🕐 Baru Diputar</h1></div>
            <div class="songs-grid" id="recentGrid"></div>
        </div>

        <!-- TOP PANEL -->
        <div class="panel" id="topPanel">
            <div class="panel-header"><h1>🏆 Top Global</h1></div>
            <div id="topGrid"></div>
        </div>

        <!-- RADIO PANEL -->
        <div class="panel" id="radioPanel">
            <div class="panel-header"><h1>📻 Radio</h1></div>
            <div class="radio-grid" id="radioGrid"></div>
        </div>

        <!-- UPLOAD PANEL -->
        <div class="panel" id="uploadPanel">
            <div class="panel-header"><h1>⬆️ Upload Musik</h1></div>
            <div class="upload-zone" id="dropzone">
                <span style="font-size:48px">📁</span>
                <p>Drag & drop MP3 atau klik</p>
                <input type="file" id="fileInput" accept="audio/mpeg" style="display:none">
                <button id="selectFileBtn" style="background:#1DB954;border:none;padding:10px 20px;border-radius:500px;margin-top:12px;cursor:pointer">Pilih File</button>
            </div>
            <div id="uploadForm" style="display:none;padding:16px">
                <div class="form-group"><input type="text" id="title" placeholder="Judul Lagu"></div>
                <div class="form-group"><input type="text" id="artist" placeholder="Artis"></div>
                <div class="form-group"><select id="genre"><option>Pop</option><option>Rock</option><option>Hip Hop</option><option>Electronic</option><option>Dangdut</option></select></div>
                <div class="form-group"><input type="file" id="coverInput" accept="image/*"></div>
                <div id="coverPreview"></div>
                <button class="btn-submit" id="uploadBtn">🚀 Upload</button>
            </div>
            <div id="uploadStatus"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" data-panel="library"><span class="icon">🏠</span><span class="label">Beranda</span></button>
        <button class="nav-btn" data-panel="liked"><span class="icon">❤️</span><span class="label">Disukai</span></button>
        <button class="nav-btn" data-panel="playlist"><span class="icon">📋</span><span class="label">Playlist</span></button>
        <button class="nav-btn" data-panel="recent"><span class="icon">🕐</span><span class="label">Baru</span></button>
        <button class="nav-btn" data-panel="top"><span class="icon">🏆</span><span class="label">Top</span></button>
        <button class="nav-btn" data-panel="radio"><span class="icon">📻</span><span class="label">Radio</span></button>
        <button class="nav-btn" data-panel="upload"><span class="icon">⬆️</span><span class="label">Upload</span></button>
    </div>

    <div class="now-playing hidden" id="nowPlaying">
        <img class="np-cover" id="npCover">
        <div style="flex:1"><div id="npTitle"></div><div id="npArtist" style="font-size:12px;color:#b3b3b3"></div></div>
        <div class="np-controls">
            <button class="ctrl-btn" id="prevBtn">⏮</button>
            <button class="ctrl-btn play-btn" id="playPauseBtn">▶</button>
            <button class="ctrl-btn" id="nextBtn">⏭</button>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
</div>

<script src="supabase-config.js"></script>
<script src="auth.js"></script>
<script src="main.js"></script>
</body>
</html>
