<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Yamify - Dashboard</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo" onclick="showPanel('library')">yamify</div>
            <div class="header-actions">
                <button class="icon-btn" id="searchBtn" onclick="toggleSearch()">🔍</button>
                <button class="icon-btn" id="settingsBtn" onclick="showSettings()">⚙️</button>
                <div class="user-menu" id="userMenu" style="display:none">
                    <img class="user-avatar" id="userAvatar" src="">
                    <span class="user-name" id="userName"></span>
                    <button class="logout-btn" id="logoutBtn" title="Logout">🚪</button>
                </div>
            </div>
        </header>

        <div id="searchOverlay" class="search-overlay hidden">
            <div class="search-header">
                <input type="text" id="globalSearchInput" placeholder="Cari lagu, artis..." autofocus>
                <button onclick="closeSearch()">✕</button>
            </div>
            <div id="searchResults" class="search-results"></div>
        </div>

        <div id="settingsModal" class="modal hidden">
            <div class="modal-content settings-content">
                <div class="modal-header"><h3>Pengaturan</h3><button class="close-modal" onclick="closeSettings()">✕</button></div>
                <div class="settings-body">
                    <div class="setting-group"><label>Tema</label><div class="theme-options"><button class="theme-btn active" data-theme="dark">🌙 Dark</button><button class="theme-btn" data-theme="light">☀️ Light</button><button class="theme-btn" data-theme="amoled">⬛ AMOLED</button></div></div>
                    <div class="setting-group"><label>Kualitas Audio</label><select id="qualitySelect"><option value="low">Rendah</option><option value="medium" selected>Sedang</option><option value="high">Tinggi</option></select></div>
                    <div class="setting-group"><label>Crossfade (detik)</label><input type="range" id="crossfadeSlider" min="0" max="12" value="0"><span id="crossfadeValue">0</span></div>
                    <div class="setting-group"><button id="clearCacheBtn" class="danger-btn">Hapus Cache</button></div>
                </div>
            </div>
        </div>

        <main class="main" id="mainContent">
            <div class="panel active" id="libraryPanel">
                <div class="panel-header"><h1>Semua Lagu</h1><button class="sort-btn" id="sortBtn">Sort by 📅</button></div>
                <div class="songs-grid" id="libraryGrid"><div class="loading-skeleton"><div class="skeleton-card"></div><div class="skeleton-card"></div></div></div>
            </div>

            <div class="panel" id="likedPanel">
                <div class="panel-header"><h1>Lagu Disukai</h1><span class="liked-count" id="likedCount">0 lagu</span></div>
                <div class="songs-grid" id="likedGrid"></div>
            </div>

            <div class="panel" id="playlistPanel">
                <div class="panel-header"><h1>Playlist Saya</h1><button class="create-btn" id="createPlaylistBtn">+ Buat Playlist</button></div>
                <div class="playlists-grid" id="playlistsGrid"></div>
            </div>

            <div class="panel" id="recentPanel">
                <div class="panel-header"><h1>Baru Diputar</h1><button class="clear-btn" id="clearRecentBtn">Hapus Riwayat</button></div>
                <div class="songs-grid" id="recentlyPlayedGrid"></div>
            </div>

            <div class="panel" id="topPanel">
                <div class="panel-header"><h1>Top Global</h1><div class="chart-period"><button class="period-btn active" data-period="week">Minggu Ini</button><button class="period-btn" data-period="month">Bulan Ini</button><button class="period-btn" data-period="all">Semua Waktu</button></div></div>
                <div class="top-charts" id="topGrid"></div>
            </div>

            <div class="panel" id="radioPanel">
                <div class="panel-header"><h1>Radio</h1><p class="subtitle">Berdasarkan mood dan genre</p></div>
                <div class="radio-stations" id="radioStations"></div>
                <div id="radioNowPlaying" style="display:none;"><div class="radio-player"><img id="radioCover" src=""><div class="radio-info"><div id="radioTitle"></div><div id="radioArtist"></div></div><button id="stopRadioBtn">⏹️ Berhenti</button></div></div>
            </div>

            <div class="panel" id="equalizerPanel">
                <div class="panel-header"><h1>Equalizer</h1><button id="eqPresetBtn">Preset</button></div>
                <div class="equalizer-container" id="equalizerContainer"></div>
                <div class="eq-presets" id="eqPresets" style="display:none;"><button data-preset="normal">Normal</button><button data-preset="bass">Bass Boost</button><button data-preset="treble">Treble Boost</button><button data-preset="vocal">Vocal</button><button data-preset="electronic">Electronic</button><button data-preset="rock">Rock</button></div>
            </div>

            <div class="panel" id="uploadPanel">
                <div class="panel-header"><h1>Upload Musik</h1><p class="subtitle">Bagikan karyamu</p></div>
                <div class="upload-form"><div class="upload-dropzone" id="dropzone"><span>📁</span><p>Drag & drop file MP3</p><button id="selectFileBtn">Pilih File</button><input type="file" id="mp3File" accept="audio/mpeg" style="display:none"></div>
                <div class="upload-details" id="uploadDetails" style="display:none;"><div class="form-group"><label>Judul Lagu</label><input type="text" id="songTitle"></div><div class="form-group"><label>Artis</label><input type="text" id="songArtist"></div><div class="form-group"><label>Genre</label><select id="songGenre"><option>Pop</option><option>Rock</option><option>Hip Hop</option><option>Electronic</option><option>Dangdut</option></select></div><div class="form-group"><label>Cover</label><input type="file" id="coverFile" accept="image/*"><div class="cover-preview" id="coverPreview"></div></div><button class="submit-btn" id="uploadSubmitBtn">🚀 Upload</button></div><div id="uploadStatus" class="upload-status"></div></div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-panel="library"><span class="icon">🏠</span><span class="label">Beranda</span></button>
            <button class="nav-btn" data-panel="liked"><span class="icon">❤️</span><span class="label">Disukai</span></button>
            <button class="nav-btn" data-panel="playlist"><span class="icon">📋</span><span class="label">Playlist</span></button>
            <button class="nav-btn" data-panel="recent"><span class="icon">🕐</span><span class="label">Baru</span></button>
            <button class="nav-btn" data-panel="top"><span class="icon">🏆</span><span class="label">Top</span></button>
            <button class="nav-btn" data-panel="radio"><span class="icon">📻</span><span class="label">Radio</span></button>
            <button class="nav-btn" data-panel="equalizer"><span class="icon">🎚️</span><span class="label">EQ</span></button>
            <button class="nav-btn" data-panel="upload"><span class="icon">⬆️</span><span class="label">Upload</span></button>
        </nav>

        <div id="nowPlayingBar" class="now-playing-bar hidden">
            <div class="player-info"><img id="playerCover" class="player-cover" src=""><div class="player-details"><div id="playerTitle" class="player-title">-</div><div id="playerArtist" class="player-artist">-</div></div><button class="like-mini" id="playerLikeBtn">🤍</button></div>
            <div class="player-controls"><button class="ctrl-btn" id="shuffleBtn">🔀</button><button class="ctrl-btn" id="prevBtn">⏮</button><button class="ctrl-btn play-btn" id="playPauseBtn">▶</button><button class="ctrl-btn" id="nextBtn">⏭</button><button class="ctrl-btn" id="repeatBtn">🔁</button></div>
            <div class="player-progress"><span id="currentTime" class="current-time">0:00</span><div class="progress-container"><div class="progress-bg"><div class="progress-fill" id="progressFill"></div></div><input type="range" id="progressBar" value="0" min="0" max="100"></div><span id="totalTime" class="total-time">0:00</span></div>
            <div class="player-extras"><button class="ctrl-btn" id="lyricsBtn">📝</button><button class="ctrl-btn" id="queueBtn">📋</button><div class="volume-control"><span>🔊</span><input type="range" id="volumeSlider" min="0" max="100" value="70"></div></div>
        </div>

        <div id="queueModal" class="modal hidden"><div class="modal-content queue-content"><div class="modal-header"><h3>Antrian</h3><button class="close-modal" onclick="closeQueue()">✕</button></div><div id="queueList" class="queue-list"></div><div class="queue-actions"><button id="clearQueueBtn">Hapus Antrian</button></div></div></div>
        <div id="lyricsModal" class="modal hidden"><div class="modal-content lyrics-content"><div class="modal-header"><h3 id="lyricsTitle">Lirik</h3><button class="close-modal" onclick="closeLyrics()">✕</button></div><div id="lyricsText" class="lyrics-text"></div></div></div>
        <div id="playlistDetailModal" class="modal hidden"><div class="modal-content playlist-detail-content"><div class="modal-header"><h3 id="playlistDetailName">Playlist</h3><button class="close-modal" onclick="closePlaylistDetail()">✕</button></div><div class="playlist-detail-actions"><button id="renamePlaylistBtn">✏️ Rename</button><button id="deletePlaylistBtn" class="danger">🗑️ Hapus</button></div><div id="playlistDetailSongs" class="playlist-detail-songs"></div></div></div>
        <div id="addToPlaylistModal" class="modal hidden"><div class="modal-content add-to-playlist-content"><div class="modal-header"><h3>Tambahkan ke Playlist</h3><button class="close-modal" onclick="closeAddToPlaylist()">✕</button></div><div id="playlistList" class="playlist-list"></div><button id="createNewFromModal" class="create-new-btn">+ Buat Playlist Baru</button></div></div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuthAndLoad();
            setupNavigation();
            await loadAllSongs();
            await loadLikedSongs();
            await loadUserPlaylists();
            await loadRecentlyPlayed();
            loadRadioStations();
            initEqualizer();
            initSettings();
            initSearch();
        });

        function setupNavigation() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const panel = btn.dataset.panel;
                    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                    document.getElementById(`${panel}Panel`).classList.add('active');
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if (panel === 'liked') renderLikedSongs();
                    if (panel === 'top') renderTopCharts();
                    if (panel === 'playlist') renderPlaylists();
                    if (panel === 'recent') loadRecentlyPlayed();
                    if (panel === 'radio') loadRadioStations();
                });
            });
        }

        function toggleSearch() { document.getElementById('searchOverlay').classList.toggle('hidden'); }
        function closeSearch() { document.getElementById('searchOverlay').classList.add('hidden'); }
        function showSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }
        function closeQueue() { document.getElementById('queueModal').classList.add('hidden'); }
        function closeLyrics() { document.getElementById('lyricsModal').classList.add('hidden'); }
        function closePlaylistDetail() { document.getElementById('playlistDetailModal').classList.add('hidden'); }
        function closeAddToPlaylist() { document.getElementById('addToPlaylistModal').classList.add('hidden'); }

        window.toggleSearch = toggleSearch;
        window.closeSearch = closeSearch;
        window.showSettings = showSettings;
        window.closeSettings = closeSettings;
        window.closeQueue = closeQueue;
        window.closeLyrics = closeLyrics;
        window.closePlaylistDetail = closePlaylistDetail;
        window.closeAddToPlaylist = closeAddToPlaylist;
        window.showPanel = (panel) => { document.querySelector(`.nav-btn[data-panel="${panel}"]`).click(); };
    </script>
</body>
</html>
