<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Yamify - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            width: 100%;
        }

        .card {
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 48px 32px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo h1 {
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(135deg, #1DB954 0%, #1ed760 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .logo p {
            color: #b3b3b3;
            font-size: 14px;
            margin-bottom: 48px;
        }

        .btn-google {
            width: 100%;
            background: white;
            color: #000;
            border: none;
            padding: 14px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s;
            margin-bottom: 16px;
        }

        .btn-google:hover {
            background: #f0f0f0;
            transform: scale(1.02);
        }

        .btn-guest {
            width: 100%;
            background: transparent;
            border: 1px solid #3a3a3a;
            color: white;
            padding: 14px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-guest:hover {
            background: #1a1a1a;
            border-color: #1DB954;
        }

        .divider {
            margin: 32px 0;
            text-align: center;
            color: #6b6b6b;
            font-size: 12px;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #2a2a2a;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .feature {
            color: #b3b3b3;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            display: none;
            font-size: 14px;
        }

        .status.error {
            background: rgba(220, 38, 38, 0.2);
            color: #ef4444;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>🎵 Yamify</h1>
                <p>Musik tanpa batas, realtime</p>
            </div>

            <button class="btn-google" id="googleLoginBtn">
                <span>🔐</span>
                Lanjutkan dengan Google
            </button>

            <button class="btn-guest" id="guestBtn">
                👤 Lanjut sebagai Tamu
            </button>

            <div class="divider">──────── ★ ────────</div>

            <div class="features">
                <div class="feature">📚 Library</div>
                <div class="feature">📋 Playlist</div>
                <div class="feature">🎵 Upload Lagu</div>
                <div class="feature">⚡ Realtime</div>
                <div class="feature">❤️ Liked Songs</div>
            </div>

            <div id="statusMessage" class="status"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vsonrlptlfuomdawpewa.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_s6ifPt76DmLW9DJaUD_6cw_SQnbiblp';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function handleGoogleLogin() {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.className = 'status';
            statusDiv.style.display = 'none';
            
            try {
                const { data, error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/dashboard.html'
                    }
                });
                
                if (error) throw error;
                
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.style.display = 'block';
                statusDiv.textContent = '❌ Gagal login: ' + error.message;
            }
        }

        function handleGuest() {
            localStorage.setItem('yamify_guest', 'true');
            window.location.href = '/guest.html';
        }

        document.getElementById('googleLoginBtn').addEventListener('click', handleGoogleLogin);
        document.getElementById('guestBtn').addEventListener('click', handleGuest);

        // Cek session
        window.addEventListener('load', async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = '/dashboard.html';
            }
        });
    </script>
</body>
</html>
