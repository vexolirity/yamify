<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Yamify - Mode Tamu</title>
    <link href="https://fonts.cdnfonts.com/css/circular-std" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Circular Std', -apple-system, system-ui, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        .app { display: flex; flex-direction: column; height: 100vh; }
        .header {
            background: #0A0A0A;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #282828;
        }
        .logo { font-size: 24px; font-weight: 900; background: linear-gradient(135deg, #1DB954, #1ed760); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .login-btn { background: #1DB954; border: none; padding: 10px 24px; border-radius: 500px; font-weight: 700; cursor: pointer; color: #000; font-family: inherit; transition: 0.2s; }
        .login-btn:hover { transform: scale(1.02); background: #1ed760; }
        .login-btn:active { transform: scale(0.98); }
        .main { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .welcome {
            background: linear-gradient(135deg, #1DB95420, #1ed76010);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #1DB95430;
        }
        .welcome h2 { font-size: 22px; margin-bottom: 6px; }
        .welcome p { font-size: 13px; color: #9B9BA0; margin-bottom: 16px; }
        .welcome button { background: #1DB954; border: none; padding: 10px 24px; border-radius: 500px; font-weight: 600; cursor: pointer; color: #000; }
        .section-title { font-size: 20px; font-weight: 700; margin: 24px 0 16px; }
        .songs-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .song-card {
            background: #121212;
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .song-card:active { transform: scale(0.97); }
        .song-cover { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
        .song-title { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-artist { font-size: 11px; color: #9B9BA0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .empty-state { text-align: center; padding: 40px; color: #6A6A6A; }
        .empty-state span { font-size: 48px; display: block; margin-bottom: 12px; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0A0A0A;
            border-top: 1px solid #282828;
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 24px;
        }
        .nav-icon {
            text-align: center;
            padding: 8px;
            flex: 1;
            cursor: pointer;
            color: #9B9BA0;
            font-size: 12px;
            transition: 0.2s;
        }
        .nav-icon.active { color: #1DB954; }
        .nav-icon span:first-child { font-size: 24px; display: block; }
        .nav-icon:hover { color: #1DB954; }
        @media (min-width: 600px) { .songs-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 900px) { .songs-grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo" onclick="window.location.href='/index.html'">yamify</div>
            <button class="login-btn" id="loginBtn">Login</button>
        </div>
        <div class="main">
            <div class="welcome">
                <h2>🎧 Mode Tamu</h2>
                <p>Dengar gratis • Login untuk upload & playlist</p>
                <button id="loginBtn2">Login Sekarang →</button>
            </div>
            
            <div id="libraryPanel">
                <div class="section-title">📚 Semua Lagu</div>
                <div id="libraryGrid" class="songs-grid"><div class="empty-state"><span>🎵</span>Memuat...</div></div>
            </div>
            
            <div id="topPanel" style="display: none;">
                <div class="section-title">🏆 Top Global</div>
                <div id="topGrid" class="songs-grid"><div class="empty-state"><span>🏆</span>Memuat...</div></div>
            </div>
        </div>
        <div class="bottom-nav">
            <div class="nav-icon active" data-panel="library"><span>📚</span><span>Library</span></div>
            <div class="nav-icon" data-panel="top"><span>🏆</span><span>Top</span></div>
        </div>
    </div>
    <script>
        // ============================================
        // YAMIFY GUEST - FULLY FIXED
        // ============================================
        
        const SUPABASE_URL = 'https://vsonrlptlfuomdawpewa.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_s6ifPt76DmLW9DJaUD_6cw_SQnbiblp';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let allSongs = [];
        let audio = null;
        let currentSong = null;
        let isPlaying = false;

        function formatDuration(s) { if(!s) return '0:00'; const m=Math.floor(s/60), sc=Math.floor(s%60); return `${m}:${sc.toString().padStart(2,'0')}`; }
        
        function escapeHtml(str) { 
            if(!str) return ''; 
            return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); 
        }

        async function loadSongs() {
            console.log('Loading songs...');
            const { data, error } = await supabase.from('songs').select('*').order('created_at', { ascending: false });
            if(error) {
                console.error('Error loading songs:', error);
                return;
            }
            if(data) { 
                allSongs = data; 
                console.log('Songs loaded:', allSongs.length);
                renderLibrary(); 
                renderTop(); 
            }
        }
        
        function renderLibrary() {
            const c = document.getElementById('libraryGrid');
            if(!c) return;
            if(!allSongs.length) { 
                c.innerHTML='<div class="empty-state"><span>🎵</span><br>Belum ada lagu<br><button onclick="window.location.href=\'/index.html\'" style="margin-top:12px;background:#1DB954;border:none;padding:8px 20px;border-radius:500px;color:#000;font-weight:600;cursor:pointer;">Login untuk Upload</button></div>'; 
                return; 
            }
            c.innerHTML = allSongs.map(s=>`
                <div class="song-card" onclick="playSong('${s.id}')">
                    <img class="song-cover" src="${s.cover_url||'https://picsum.photos/200/200'}" onerror="this.src='https://picsum.photos/200/200'">
                    <div class="song-title">${escapeHtml(s.title)}</div>
                    <div class="song-artist">${escapeHtml(s.artist)}</div>
                </div>
            `).join('');
        }
        
        function renderTop() {
            const c = document.getElementById('topGrid');
            if(!c) return;
            const top = [...allSongs].sort((a,b)=>(b.play_count||0)-(a.play_count||0)).slice(0,20);
            if(!top.length) { 
                c.innerHTML='<div class="empty-state"><span>🏆</span><br>Belum ada data chart</div>'; 
                return; 
            }
            c.innerHTML = top.map((s,i)=>`
                <div class="song-card" onclick="playSong('${s.id}')">
                    <img class="song-cover" src="${s.cover_url||'https://picsum.photos/200/200'}" onerror="this.src='https://picsum.photos/200/200'">
                    <div class="song-title">${i+1}. ${escapeHtml(s.title)}</div>
                    <div class="song-artist">${escapeHtml(s.artist)}</div>
                </div>
            `).join('');
        }
        
        function playSong(id) {
            const s = allSongs.find(x=>x.id===id);
            if(!s || !s.mp3_url) { 
                alert('Gagal memutar lagu: file tidak tersedia'); 
                return; 
            }
            if(!audio) { 
                audio = new Audio(); 
                audio.addEventListener('ended',()=>{ isPlaying=false; }); 
            }
            if(currentSong?.id===id && audio.src) { 
                if(isPlaying) { audio.pause(); } else { audio.play(); }
                isPlaying = !isPlaying;
                return; 
            }
            currentSong = s;
            audio.src = s.mp3_url;
            audio.play();
            isPlaying = true;
            // Update play count
            supabase.from('songs').update({ play_count: (s.play_count||0)+1 }).eq('id', id);
        }
        
        // ========== FIX LOGIN - LANGSUNG KE GOOGLE ==========
        async function handleLogin() {
            console.log('🔐 Login button clicked - redirecting to Google...');
            try {
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: { 
                        redirectTo: window.location.origin + '/dashboard.html'
                    }
                });
                if (error) {
                    console.error('Login error:', error);
                    alert('Login gagal: ' + error.message);
                } else {
                    console.log('Redirecting to Google...', data);
                }
            } catch(e) {
                console.error('Exception:', e);
                alert('Terjadi kesalahan: ' + e.message);
            }
        }
        
        // ========== FIX NAVIGATION - PASTI BERUBAH ==========
        function setupNavigation() {
            const libraryPanel = document.getElementById('libraryPanel');
            const topPanel = document.getElementById('topPanel');
            const libraryIcon = document.querySelector('.nav-icon[data-panel="library"]');
            const topIcon = document.querySelector('.nav-icon[data-panel="top"]');
            
            if(libraryIcon) {
                // Hapus event listener lama
                const newLibraryIcon = libraryIcon.cloneNode(true);
                libraryIcon.parentNode.replaceChild(newLibraryIcon, libraryIcon);
                
                newLibraryIcon.addEventListener('click', (e) => {
                    e.preventDefault();
                    console.log('Library clicked');
                    newLibraryIcon.classList.add('active');
                    if(topIcon) topIcon.classList.remove('active');
                    libraryPanel.style.display = 'block';
                    topPanel.style.display = 'none';
                    renderLibrary();
                });
            }
            
            if(topIcon) {
                // Hapus event listener lama
                const newTopIcon = topIcon.cloneNode(true);
                topIcon.parentNode.replaceChild(newTopIcon, topIcon);
                
                newTopIcon.addEventListener('click', (e) => {
                    e.preventDefault();
                    console.log('Top clicked');
                    newTopIcon.classList.add('active');
                    if(libraryIcon) document.querySelector('.nav-icon[data-panel="library"]')?.classList.remove('active');
                    libraryPanel.style.display = 'none';
                    topPanel.style.display = 'block';
                    renderTop();
                });
            }
        }
        
        // ========== PASANG EVENT LISTENER DENGAN CARA YANG AMAN ==========
        function setupLoginButtons() {
            const loginBtn = document.getElementById('loginBtn');
            const loginBtn2 = document.getElementById('loginBtn2');
            
            if(loginBtn) {
                const newLoginBtn = loginBtn.cloneNode(true);
                loginBtn.parentNode.replaceChild(newLoginBtn, loginBtn);
                newLoginBtn.addEventListener('click', handleLogin);
                console.log('✅ Login button siap');
            } else {
                console.error('❌ Login button tidak ditemukan!');
            }
            
            if(loginBtn2) {
                const newLoginBtn2 = loginBtn2.cloneNode(true);
                loginBtn2.parentNode.replaceChild(newLoginBtn2, loginBtn2);
                newLoginBtn2.addEventListener('click', handleLogin);
                console.log('✅ Login button 2 siap');
            }
        }
        
        // ========== INIT ==========
        setupLoginButtons();
        setupNavigation();
        loadSongs();
        
        // Export ke global
        window.playSong = playSong;
        window.handleLogin = handleLogin;
        
        console.log('✅ Guest mode ready - Login bisa, Library & Top bisa');
    </script>
</body>
</html>
